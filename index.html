<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMC AI Scan - Full Info</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; color: white; font-weight: bold;
            opacity: 0; transition: opacity 0.3s; z-index: 9999;
        }
        #toast.show { opacity: 1; }
        .loading-spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #6366f1;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100">

    <div class="max-w-md mx-auto min-h-screen pb-24 bg-white shadow-xl relative">
        <div id="toast"></div>

        <div class="p-6 text-center border-b bg-indigo-700 text-white">
            <h1 class="text-xl font-black">DMC AI SCANNER</h1>
            <p class="text-[10px] opacity-80 uppercase tracking-widest">Part No & Name Recognition</p>
        </div>

        <div class="p-6">
            <label id="upload-label" for="photo-input" class="flex flex-col items-center justify-center w-full h-64 border-4 border-dashed border-indigo-200 rounded-3xl bg-indigo-50 active:bg-indigo-100 transition-all cursor-pointer">
                <div class="text-6xl mb-4">📸</div>
                <span class="text-lg font-bold text-indigo-600">ラベルを撮影する</span>
                <span class="text-[10px] text-gray-400 mt-2">品番 và 品名 sẽ được lấy tự động</span>
                <input id="photo-input" type="file" accept="image/*" capture="environment" class="hidden">
            </label>

            <div id="processing" class="hidden mt-8 text-center">
                <div class="loading-spinner mx-auto mb-3"></div>
                <p class="text-sm font-bold text-indigo-600 animate-pulse">AI đang phân tích chữ viết...</p>
            </div>

            <div id="result-form" class="mt-8 hidden animate-in fade-in">
                <div class="bg-gray-900 rounded-2xl p-5 text-white shadow-2xl">
                    <div class="mb-5">
                        <label class="text-[10px] text-indigo-400 font-black uppercase">品番 (Part Number)</label>
                        <input id="out-partno" type="text" class="w-full bg-transparent border-b-2 border-indigo-500 text-xl font-black outline-none focus:border-white py-1">
                    </div>
                    <div class="mb-5">
                        <label class="text-[10px] text-indigo-400 font-black uppercase">品名 (Part Name)</label>
                        <input id="out-name" type="text" class="w-full bg-transparent border-b-2 border-indigo-500 text-lg font-bold outline-none focus:border-white py-1">
                    </div>
                    <div class="flex items-center justify-between bg-white/10 p-3 rounded-xl">
                        <label class="font-bold text-sm">数量</label>
                        <input id="out-qty" type="number" value="1" class="w-20 bg-white text-gray-900 rounded text-center font-bold p-1 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="location.reload()" class="bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">撮り直す</button>
                    <button onclick="submitToSheet()" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">登録する</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://buzaikanri.onrender.com";

        function showToast(msg, isErr=false) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.style.background = isErr ? "#ef4444" : "#10b981";
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('upload-label').classList.add('hidden');
            document.getElementById('processing').classList.remove('hidden');

            try {
                // Khởi tạo AI OCR (Hỗ trợ cả tiếng Nhật và tiếng Anh)
                const worker = await Tesseract.createWorker('jpn+eng');
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                console.log("Raw Text:", text); // Debug dữ liệu thô

                // LOGIC TÁCH DỮ LIỆU:
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                let partNo = "";
                let partName = "";

                lines.forEach((line, index) => {
                    // Tìm dòng chứa "品番" hoặc "PART No"
                    if (line.includes("品番") || line.includes("PART No")) {
                        // Lấy phần chữ sau từ khóa hoặc lấy dòng tiếp theo nếu dòng hiện tại không có mã
                        partNo = line.split(/品番|No/i)[1]?.trim() || lines[index + 1];
                    }
                    // Tìm dòng chứa "品名" hoặc "PART NAME"
                    if (line.includes("品名") || line.includes("PART NAME")) {
                        partName = line.split(/品名|NAME/i)[1]?.trim() || lines[index + 1];
                    }
                });

                // Làm sạch dữ liệu (Xóa các ký tự thừa hay gặp khi OCR nhầm)
                const clean = (str) => str ? str.replace(/[:：]/g, "").trim() : "";

                document.getElementById('out-partno').value = clean(partNo);
                document.getElementById('out-name').value = clean(partName);
                
                document.getElementById('processing').classList.add('hidden');
                document.getElementById('result-form').classList.remove('hidden');

            } catch (err) {
                showToast("Dữ liệu ảnh không rõ ràng, vui lòng chụp lại", true);
                location.reload();
            }
        });

        async function submitToSheet() {
            const pn = document.getElementById('out-partno').value;
            const nm = document.getElementById('out-name').value;
            const qt = document.getElementById('out-qty').value;

            if(!pn) return showToast("品番を入力してください", true);

            try {
                const res = await fetch(`${API_BASE}/stock/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ part_no: pn, name: nm, qty: parseInt(qt), user: "AI_OCR" })
                });
                if(!res.ok) throw new Error();
                showToast("登録完了！");
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showToast("Lỗi kết nối Server", true);
            }
        }
    </script>
</body>
</html>
