<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部材在庫管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; }
        .page { display: none; padding: 20px; max-width: 600px; margin: auto; }
        .active { display: block; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="page active">
        <div class="bg-white p-8 rounded-xl shadow-md mt-20 text-center">
            <h1 class="text-2xl font-bold mb-6">在庫管理システム</h1>
            <input id="user-name" type="text" placeholder="名前を入力" class="w-full border p-3 rounded-lg mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">ログイン</button>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menu-page" class="page">
        <h2 class="text-xl font-bold mb-4">こんにちは、<span id="display-user"></span>さん</h2>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="showPage('add-page')" class="bg-green-500 text-white p-4 rounded-xl font-bold">部材を追加 (Nhập kho)</button>
            <button onclick="showPage('use-page')" class="bg-orange-500 text-white p-4 rounded-xl font-bold">部材を使用 (Xuất kho)</button>
            <button onclick="showPage('history-page')" class="bg-gray-500 text-white p-4 rounded-xl font-bold">履歴を表示 (Lịch sử)</button>
        </div>
    </div>

    <!-- Add Material -->
    <div id="add-page" class="page">
        <h2 class="text-xl font-bold mb-4">部材追加</h2>
        <input id="add-hinban" type="text" placeholder="品番 (Mã)" class="w-full border p-3 rounded mb-2">
        <input id="add-hinmei" type="text" placeholder="品名 (Tên)" class="w-full border p-3 rounded mb-2">
        <input id="add-qty" type="number" placeholder="数量 (Số lượng)" class="w-full border p-3 rounded mb-4">
        <button onclick="addMaterial()" class="w-full bg-green-600 text-white p-3 rounded font-bold">登録</button>
        <button onclick="showPage('menu-page')" class="w-full mt-2 text-gray-500">戻る</button>
    </div>

    <!-- Use Material -->
    <div id="use-page" class="page">
        <h2 class="text-xl font-bold mb-4">部材 sử dụng</h2>
        <input id="use-hinban" type="text" placeholder="品番 (Mã)" class="w-full border p-3 rounded mb-2">
        <input id="use-qty" type="number" placeholder="数量 (Số lượng)" class="w-full border p-3 rounded mb-4">
        <button onclick="useMaterial()" class="w-full bg-orange-600 text-white p-3 rounded font-bold">出庫</button>
        <button onclick="showPage('menu-page')" class="w-full mt-2 text-gray-500">戻る</button>
    </div>

    <!-- History -->
    <div id="history-page" class="page">
        <h2 class="text-xl font-bold mb-4">履歴</h2>
        <div id="history-list" class="bg-white p-4 rounded shadow max-h-96 overflow-y-auto"></div>
        <button onclick="showPage('menu-page')" class="w-full mt-4 bg-gray-200 p-2 rounded">戻る</button>
    </div>

    <script>
        const API = window.location.origin;
        let currentUser = "";

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'history-page') loadHistory();
        }

        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("名前を入力してください");
            currentUser = name;
            document.getElementById('display-user').innerText = name;
            showPage('menu-page');
        }

        async function addMaterial() {
            const hinban = document.getElementById('add-hinban').value;
            const hinmei = document.getElementById('add-hinmei').value;
            const quantity = document.getElementById('add-qty').value;
            
            const res = await fetch(`${API}/add`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({hinban, hinmei, quantity: parseInt(quantity), user: currentUser})
            });
            if(res.ok) { alert("成功!"); showPage('menu-page'); }
        }

        async function useMaterial() {
            const hinban = document.getElementById('use-hinban').value;
            const quantity = document.getElementById('use-qty').value;
            
            const res = await fetch(`${API}/use`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({hinban, quantity: parseInt(quantity), user: currentUser})
            });
            const data = await res.json();
            if(data.ok) { alert("成功!"); showPage('menu-page'); } else { alert(data.message); }
        }

        async function loadHistory() {
            const res = await fetch(`${API}/history`);
            const data = await res.json();
            const list = document.getElementById('history-list');
            list.innerHTML = data.reverse().map(h => `
                <div class="border-b py-2 text-sm">
                    <b>${h.操作}</b>: ${h.品番} (${h.数量}) - ${h.作業者}<br>
                    <span class="text-xs text-gray-400">${h.時間}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
