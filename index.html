<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMC Auto-Fill System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-animation {
            border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative pb-20">
        <div class="bg-indigo-700 p-6 text-center text-white shadow-md">
            <h1 class="text-2xl font-black italic">DMC SMART SCAN</h1>
            <p class="text-[10px] opacity-70 tracking-[0.2em] mt-1">AUTOMATIC DATA EXTRACTION</p>
        </div>

        <div class="p-6">
            <label id="drop-zone" for="file-input" class="flex flex-col items-center justify-center w-full h-72 border-4 border-dashed border-indigo-100 rounded-[2rem] bg-indigo-50 active:bg-indigo-100 transition-all cursor-pointer">
                <div class="text-7xl mb-4">📸</div>
                <span class="text-lg font-bold text-indigo-700">ラベルを撮影</span>
                <p class="text-[10px] text-gray-400 mt-2 text-center px-8">
                    Chụp rõ <b>Mã Vuông (Data Matrix)</b><br>để tự động lấy 品番 và 品名
                </p>
                <input id="file-input" type="file" accept="image/*" capture="environment" class="hidden">
            </label>

            <div id="loader" class="hidden flex-col items-center mt-10">
                <div class="loading-animation"></div>
                <p class="text-indigo-500 font-bold mt-4 animate-pulse">AI đang bóc tách dữ liệu...</p>
            </div>

            <div id="result-card" class="hidden mt-8 animate-in slide-in-from-bottom duration-500">
                <div class="bg-gray-900 rounded-[2rem] p-6 text-white shadow-2xl border-t-4 border-indigo-500">
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] text-indigo-400 font-black uppercase tracking-widest block mb-1">Part Number (品番)</label>
                            <input id="res-pn" type="text" class="w-full bg-transparent border-b-2 border-indigo-800 text-2xl font-black outline-none focus:border-white transition-colors py-1">
                        </div>
                        <div>
                            <label class="text-[10px] text-indigo-400 font-black uppercase tracking-widest block mb-1">Part Name (品名)</label>
                            <input id="res-nm" type="text" class="w-full bg-transparent border-b-2 border-indigo-800 text-lg font-bold outline-none focus:border-white transition-colors py-1">
                        </div>
                        <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10">
                            <span class="font-bold">入庫数</span>
                            <input id="res-qty" type="number" value="1" class="w-20 bg-indigo-600 text-white text-center font-black rounded-lg py-2 outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="location.reload()" class="bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:scale-95 transition-all">撮り直す</button>
                    <button onclick="submitData()" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all">登録確定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://buzaikanri.onrender.com";

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            // Khởi tạo engine quét mã
            const scanner = new Html5Qrcode("loader");

            try {
                // Quét mã Data Matrix (Mã vuông của Panasonic)
                const decoded = await scanner.scanFile(file, true);
                
                // Logic xử lý chuỗi Panasonic: "Mã_品番 <cách_nhiều_khoảng_trắng> Tên_品名"
                // Ví dụ từ ảnh của bạn: "MTNS000437AA  FLOW SENSOR"
                const raw = decoded.trim();
                const segments = raw.split(/\s{2,}/); // Tách khi thấy 2 khoảng trắng trở lên

                let finalPn = segments[0] || "";
                let finalNm = segments[1] || "";

                // Trường hợp mã vuông định dạng dính liền (dự phòng)
                if(!finalNm && raw.length > 12) {
                    finalPn = raw.substring(0, 12).trim();
                    finalNm = raw.substring(12).trim();
                }

                document.getElementById('res-pn').value = finalPn;
                document.getElementById('res-nm').value = finalNm;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('result-card').classList.remove('hidden');

            } catch (err) {
                alert("Mã vuông không rõ nét hoặc không chứa dữ liệu. Vui lòng chụp gần mã vuông hơn.");
                location.reload();
            }
        });

        async function submitData() {
            const payload = {
                part_no: document.getElementById('res-pn').value,
                name: document.getElementById('res-nm').value,
                qty: parseInt(document.getElementById('res-qty').value),
                user: "AUTO_DETECTOR"
            };

            try {
                const res = await fetch(`${API_BASE}/stock/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert("Đã đăng ký thành công!");
                    location.reload();
                } else {
                    alert("Lỗi server!");
                }
            } catch (e) {
                alert("Lỗi kết nối!");
            }
        }
    </script>
</body>
</html>
