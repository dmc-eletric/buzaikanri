<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMC OCR System</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; color: white; font-weight: bold;
            opacity: 0; transition: opacity 0.3s; z-index: 9999;
        }
        #toast.show { opacity: 1; }
        .loading-ring {
            border: 4px solid #f3f3f3; border-top: 4px solid #6366f1;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100">

    <div class="max-w-md mx-auto min-h-screen pb-24 bg-white shadow-xl relative">
        <div id="toast"></div>

        <div class="p-6 text-center border-b">
            <h1 class="text-2xl font-black text-indigo-700">DMC AI SCAN</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Text Recognition Mode</p>
        </div>

        <div id="main-content" class="p-6">
            <label for="ocr-upload" class="flex flex-col items-center justify-center w-full h-64 border-4 border-dashed border-indigo-200 rounded-3xl bg-indigo-50 active:bg-indigo-100 transition-all cursor-pointer">
                <div class="text-6xl mb-4">📸</div>
                <span class="text-lg font-bold text-indigo-600">ラベルを撮影する</span>
                <span class="text-xs text-gray-400 mt-2 text-center px-4">品番と品名がはっきり写るように<br>正面から撮影してください</span>
                <input id="ocr-upload" type="file" accept="image/*" capture="environment" class="hidden">
            </label>

            <div id="status-area" class="hidden mt-6 text-center">
                <div class="loading-ring mx-auto mb-2"></div>
                <p id="status-text" class="text-sm font-bold text-indigo-600 italic">文字を解析中...</p>
            </div>

            <div id="result-area" class="mt-8 hidden animate-fade-in">
                <div class="bg-indigo-900 rounded-2xl p-5 text-white shadow-lg">
                    <div class="mb-4">
                        <label class="text-[10px] text-indigo-300 font-bold">品番 (PART NO.)</label>
                        <input id="res-partno" type="text" class="w-full bg-transparent border-b border-indigo-500 text-xl font-black outline-none focus:border-white py-1">
                    </div>
                    <div class="mb-4">
                        <label class="text-[10px] text-indigo-300 font-bold">品名 (PART NAME)</label>
                        <input id="res-name" type="text" class="w-full bg-transparent border-b border-indigo-500 text-lg font-bold outline-none focus:border-white py-1">
                    </div>
                    <div class="flex items-center justify-between bg-white/10 p-3 rounded-xl">
                        <label class="font-bold text-sm">入庫数量</label>
                        <input id="res-qty" type="number" value="1" class="w-16 bg-white text-indigo-900 rounded text-center font-bold p-1">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="location.reload()" class="bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold">やり直し</button>
                    <button onclick="submitData()" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">登録する</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around">
            <button onclick="location.reload()" class="flex flex-col items-center text-indigo-600">
                <span class="text-2xl">🏠</span><span class="text-[10px] font-bold">HOME</span>
            </button>
        </nav>
    </div>

    <script>
        const API_URL = "https://buzaikanri.onrender.com"; // Thay bằng URL Render của bạn

        // Hàm hiển thị thông báo
        function showToast(msg, isErr=false) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.style.background = isErr ? "#ef4444" : "#10b981";
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        // Xử lý khi người dùng chụp ảnh
        document.getElementById('ocr-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Hiển thị trạng thái đang quét
            document.getElementById('status-area').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');

            try {
                // Sử dụng Tesseract để đọc chữ
                const worker = await Tesseract.createWorker('jpn+eng'); // Nhận diện cả Nhật và Anh
                const ret = await worker.recognize(file);
                const fullText = ret.data.text;
                await worker.terminate();

                // Phân tích logic dựa trên format nhãn của bạn
                // Nhãn Panasonic luôn có: 品番 [Mã] \n 品名 [Tên]
                const lines = fullText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
                
                let foundPartNo = "";
                let foundPartName = "";

                // Logic tìm kiếm thông minh:
                for(let i=0; i<lines.length; i++) {
                    if(lines[i].includes("品番") || lines[i].includes("PART")) {
                        foundPartNo = lines[i].replace(/品番|PART|No|\.|\s|:|/g, "");
                    }
                    if(lines[i].includes("品名") || lines[i].includes("NAME")) {
                        foundPartName = lines[i].replace(/品名|PART|NAME|\s|:|/g, "");
                    }
                }

                // Điền kết quả vào form để người dùng kiểm tra lại
                document.getElementById('res-partno').value = foundPartNo || lines[0] || "";
                document.getElementById('res-name').value = foundPartName || lines[1] || "";
                
                document.getElementById('status-area').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                showToast("文字を読み取れませんでした。もう一度撮影してください。", true);
                document.getElementById('status-area').classList.add('hidden');
            }
        });

        // Gửi dữ liệu lên Server
        async function submitData() {
            const part_no = document.getElementById('res-partno').value;
            const name = document.getElementById('res-name').value;
            const qty = document.getElementById('res-qty').value;

            if(!part_no) return showToast("品番が必要です", true);

            try {
                const r = await fetch(`${API_URL}/stock/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        part_no: part_no,
                        name: name,
                        qty: parseInt(qty),
                        user: "AI_SCAN"
                    })
                });
                if(!r.ok) throw new Error("登録に失敗しました");
                showToast("登録完了！");
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showToast(e.message, true);
            }
        }
    </script>
</body>
</html>
