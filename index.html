<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部材管理システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Styles for Mobile UX */
        .page { display: block; }
        .hidden { display: none; }
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 8px; color: white; font-weight: bold;
            opacity: 0; transition: opacity 0.3s; z-index: 9999;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="max-w-md mx-auto min-h-screen pb-20">
        
        <script>
            const API = "https://buzaikanri.onrender.com"; 
            let token = localStorage.getItem("parts_token") || null;
            let currentUser = localStorage.getItem("parts_username") || "";
            let addScanner = null;
            let useScanner = null;
            let addScanLocked = false;
            let useScanLocked = false;
            let addScanCurrentData = null;
            let useConfirmData = null;

            // --- HÀM API ĐÃ SỬA LỖI CÚ PHÁP & DẤU GẠCH CHÉO ---
            const api = async (path, opts={}) => {
                const h = {"Content-Type":"application/json"};
                if(token) h["Authorization"] = `Bearer ${token}`;

                const baseUrl = API.endsWith('/') ? API.slice(0, -1) : API;
                const cleanPath = path.startsWith('/') ? path.slice(1) : path;
                const finalUrl = `${baseUrl}/${cleanPath}`;

                const r = await fetch(finalUrl, {
                    ...opts, 
                    headers: { ...h, ...(opts.headers || {}) }
                });
                
                if(!r.ok){
                    let msg = "エラーが発生しました";
                    try { 
                        const j = await r.json(); 
                        msg = j.detail || j.message || msg; 
                    } catch(e) {}
                    throw new Error(msg);
                }
                return r.json();
            };

            function showToast(msg, isErr=false){
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.background = isErr ? "#ef4444" : "#10b981";
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            }
        </script>

        <div id="toast"></div>

        <header class="p-4 bg-white shadow-sm flex justify-between items-center">
            <h1 class="font-bold text-lg text-indigo-600">部材管理</h1>
            <span id="user-display" class="text-sm text-gray-500"></span>
        </header>

        <div id="page-home" class="page p-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="go('add')" class="p-6 bg-white border rounded-xl shadow-sm text-center">
                    <div class="text-3xl mb-2">➕</div>
                    <div class="font-bold">部材追加</div>
                </button>
                <button onclick="go('use')" class="p-6 bg-white border rounded-xl shadow-sm text-center">
                    <div class="text-3xl mb-2">➖</div>
                    <div class="font-bold">部材使用</div>
                </button>
            </div>
        </div>

       
        <div id="page-add" class="page hidden p-4">
            <h2 class="font-bold mb-4">部材追加 (Scanner)</h2>
            <div id="add-qr-reader" class="rounded-lg overflow-hidden border"></div>
            <div id="add-scan-result" class="mt-2 text-center text-sm font-bold text-indigo-600"></div>
            
            <div id="add-scan-info" class="mt-4 p-4 bg-white border rounded-lg shadow-sm" style="display:none;">
                <div class="mb-2"><span class="text-gray-500">品番:</span> <span id="add-scan-partno" class="font-bold"></span></div>
                <div id="add-scan-status-label" class="text-xs text-orange-500 mb-2"></div>
                <div class="mb-2"><span class="text-gray-500">品名:</span> <span id="add-scan-name"></span></div>
                <div id="add-scan-new-name-wrap" class="mb-2">
                    <input id="add-scan-new-name" type="text" placeholder="新規品名を入力" class="w-full border p-2 rounded">
                </div>
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-gray-500">数量:</span>
                    <input id="add-scan-qty-input" type="number" class="border p-2 rounded w-24" placeholder="0">
                </div>
                <button onclick="submitScanAdd()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">追加する</button>
                <button onclick="resumeAddScan()" class="w-full mt-2 text-gray-500 text-sm">キャンセル</button>
            </div>
        </div>

        <script>
            function go(page){
                document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
                document.getElementById('page-' + page).classList.remove('hidden');
                stopAllScanners();
                if(page === 'add') startAddScanner();
                if(page === 'use') startUseScanner();
            }

            async function stopAllScanners(){
                try {
                    if(addScanner) { await addScanner.stop(); addScanner = null; }
                    if(useScanner) { await useScanner.stop(); useScanner = null; }
                } catch(e) {}
            }

            // --- HÀM QUÉT MÃ VẠCH CODE 128 TỐI ƯU ---
            function startAddScanner(){
                addScanLocked = false;
                addScanner = new Html5Qrcode("add-qr-reader");
                const config = { 
                    fps: 20, 
                    qrbox: { width: 280, height: 120 }, // Hình chữ nhật cho mã vạch
                    formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.QR_CODE ]
                };

                addScanner.start({ facingMode: "environment" }, config, async (decoded) => {
                    if(addScanLocked) return;
                    addScanLocked = true;
                    const pn = decoded.trim();
                    document.getElementById("add-scan-result").textContent = `品番: ${pn}`;
                    
                    try {
                        // Tìm kiếm trên sheet "stock"
                        const r = await api(`/stock/search?part_no=${encodeURIComponent(pn)}`);
                        document.getElementById("add-scan-info").style.display = "block";
                        document.getElementById("add-scan-partno").textContent = pn;
                        
                        if(r && r.part_no){
                            document.getElementById("add-scan-status-label").textContent = "既存品番";
                            document.getElementById("add-scan-name").textContent = r.name;
                            document.getElementById("add-scan-new-name-wrap").style.display = "none";
                            addScanCurrentData = {part_no:pn, name:r.name, is_new:false};
                        } else {
                            document.getElementById("add-scan-status-label").textContent = "未登録品番";
                            document.getElementById("add-scan-name").textContent = "（未登録）";
                            document.getElementById("add-scan-new-name-wrap").style.display = "block";
                            addScanCurrentData = {part_no:pn, name:"", is_new:true};
                        }
                    } catch(e) { showToast(e.message, true); addScanLocked = false; }
                });
            }

            async function submitScanAdd(){
                const qty = parseInt(document.getElementById("add-scan-qty-input").value);
                if(!qty || qty < 1) return showToast("数量を入力してください", true);
                let name = addScanCurrentData.name;
                if(addScanCurrentData.is_new) name = document.getElementById("add-scan-new-name").value;

                try {
                    await api("/stock/add", {
                        method: "POST",
                        body: JSON.stringify({ part_no: addScanCurrentData.part_no, name, qty, user: currentUser || "guest" })
                    });
                    showToast("追加完了");
                    go('home');
                } catch(e) { showToast(e.message, true); }
            }

            function resumeAddScan() {
                addScanLocked = false;
                document.getElementById("add-scan-info").style.display = "none";
                document.getElementById("add-scan-result").textContent = "再開しました";
            }
        </script>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2">
            <button onclick="go('home')" class="text-center p-2">🏠<br><span class="text-xs">Home</span></button>
            <button onclick="go('add')" class="text-center p-2">➕<br><span class="text-xs">入庫</span></button>
            <button onclick="go('use')" class="text-center p-2">➖<br><span class="text-xs">出庫</span></button>
        </nav>

    </div>
</body>
</html>
