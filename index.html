<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMC Inventory - Compact UI</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; color: white; font-weight: bold;
            opacity: 0; transition: opacity 0.3s; z-index: 9999; pointer-events: none;
        }
        #toast.show { opacity: 1; }
        .loading-spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #6366f1;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 overflow-hidden"> <div class="max-w-md mx-auto h-screen relative shadow-2xl bg-white flex flex-col">
        <div id="toast" class="shadow-xl text-sm"></div>

        <div class="p-4 text-center border-b bg-white">
            <h1 class="text-xl font-black text-indigo-700 tracking-tighter">DMC SMART SCAN</h1>
        </div>

        <div class="flex-1 p-6 flex flex-col justify-center overflow-y-auto">
            
            <div id="upload-section" class="w-full">
                <label for="file-input" class="flex flex-col items-center justify-center p-10 border-4 border-dashed border-indigo-100 rounded-[2.5rem] bg-indigo-50 active:scale-95 transition-all cursor-pointer">
                    <span class="text-7xl mb-4">📸</span>
                    <span class="font-bold text-indigo-600 text-lg">ラベルを撮影する</span>
                    <span class="text-[10px] text-gray-400 mt-2 italic text-center leading-relaxed">
                        バーコードが中央に写るように<br>水平に撮影してください
                    </span>
                    <input id="file-input" type="file" accept="image/*" capture="environment" class="hidden">
                </label>
            </div>

            <div id="processing-status" class="hidden text-center py-10">
                <div class="loading-spinner mb-4"></div>
                <p class="text-indigo-600 font-bold animate-pulse">画像を解析しています...</p>
            </div>

            <div id="result-section" class="hidden animate-in fade-in zoom-in duration-300">
                <div class="bg-indigo-900 rounded-[2rem] p-6 text-white shadow-2xl">
                    <div class="space-y-6">
                        <div>
                            <div class="text-[10px] text-indigo-300 font-bold tracking-widest uppercase">Part Number</div>
                            <input id="res-pn" type="text" readonly class="w-full bg-transparent border-b-2 border-indigo-700 text-2xl font-black py-1 outline-none">
                        </div>
                        
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest">Part Name</label>
                                <span id="res-status-badge" class="px-2 py-0.5 rounded text-[8px] font-black uppercase"></span>
                            </div>
                            <div id="res-name-display" class="font-bold text-lg mb-2"></div>
                            <div id="res-new-name-input-wrap" class="hidden">
                                <input id="res-new-name" type="text" placeholder="品名を入力" class="w-full bg-white text-gray-800 p-3 rounded-xl text-sm outline-none border-2 border-indigo-400">
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-white/10 p-4 rounded-2xl">
                            <span class="font-bold text-sm">数量</span>
                            <input id="res-qty" type="number" value="1" class="w-20 bg-indigo-600 text-white text-center text-2xl font-black rounded-lg py-1 outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="resetToUpload()" class="bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold active:bg-gray-200">やり直し</button>
                    <button onclick="submitData()" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 active:bg-indigo-700">登録確定</button>
                </div>
            </div>
        </div>

        <nav class="bg-white border-t p-4 flex justify-around items-center">
            <button onclick="location.reload()" class="flex flex-col items-center text-indigo-600">
                <span class="text-2xl">🏠</span>
                <span class="text-[9px] font-bold uppercase mt-1">Home</span>
            </button>
        </nav>

        <script>
            const API = "https://buzaikanri.onrender.com";
            let currentItemData = null;

            function showToast(msg, isErr=false){
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.background = isErr ? "#ef4444" : "#10b981";
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            }

            document.getElementById('file-input').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // UIの切り替え
                document.getElementById('upload-section').classList.add('hidden');
                document.getElementById('processing-status').classList.remove('hidden');

                const scanner = new Html5Qrcode("upload-section");
                try {
                    const decoded = await scanner.scanFile(file, true);
                    handleSuccess(decoded.trim());
                } catch (err) {
                    showToast("バーコードが読めません。撮り直してください", true);
                    resetToUpload();
                }
            });

            async function handleSuccess(pn) {
                try {
                    const r = await fetch(`${API}/stock/search?part_no=${encodeURIComponent(pn)}`).then(res => res.json());
                    
                    document.getElementById('processing-status').classList.add('hidden');
                    document.getElementById('result-section').classList.remove('hidden');
                    
                    document.getElementById('res-pn').value = pn;
                    const badge = document.getElementById('res-status-badge');
                    
                    if(r && r.part_no) {
                        badge.textContent = "Registered";
                        badge.className = "px-2 py-0.5 rounded text-[8px] font-black uppercase bg-green-500 text-white";
                        document.getElementById('res-name-display').textContent = r.name;
                        document.getElementById('res-new-name-input-wrap').classList.add('hidden');
                        currentItemData = { pn, name: r.name, isNew: false };
                    } else {
                        badge.textContent = "New Item";
                        badge.className = "px-2 py-0.5 rounded text-[8px] font-black uppercase bg-orange-500 text-white";
                        document.getElementById('res-name-display').textContent = "未登録の品番";
                        document.getElementById('res-new-name-input-wrap').classList.remove('hidden');
                        currentItemData = { pn, name: "", isNew: true };
                    }
                } catch (e) {
                    showToast("エラーが発生しました", true);
                    resetToUpload();
                }
            }

            function resetToUpload() {
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('processing-status').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
                document.getElementById('file-input').value = "";
            }

            async function submitData() {
                const qty = parseInt(document.getElementById('res-qty').value);
                let name = currentItemData.name;
                
                if(currentItemData.isNew) {
                    name = document.getElementById('res-new-name').value.trim();
                    if(!name) return showToast("品名を入力してください", true);
                }

                try {
                    const res = await fetch(`${API}/stock/add`, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ part_no: currentItemData.pn, name: name, qty: qty, user: "SMART_SCAN" })
                    });
                    if(res.ok) {
                        showToast("登録に成功しました！");
                        setTimeout(() => location.reload(), 1500);
                    }
                } catch (e) { showToast("登録に失敗しました", true); }
            }
        </script>
    </div>
</body>
</html>
