<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMC 部材管理システム</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* スキャンエリアの赤いガイド枠 */
        .scanner-container {
            position: relative;
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .scan-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 35%;
            border: 3px solid #ff0000;
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .scan-line {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: red;
            box-shadow: 0 0 10px red;
            animation: scan-anim 2s infinite linear;
            z-index: 11;
        }
        @keyframes scan-anim {
            0% { top: 35%; } 50% { top: 65%; } 100% { top: 35%; }
        }
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 50px; color: white; font-weight: bold;
            opacity: 0; transition: 0.3s; z-index: 9999; pointer-events: none;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative pb-24">
        <div id="toast" class="shadow-lg"></div>

        <div class="bg-indigo-700 p-6 text-center shadow-md">
            <h1 class="text-2xl font-bold text-white tracking-tight">DMC 部材管理</h1>
            <p class="text-[10px] text-indigo-200 mt-1">バーコード自動照会システム</p>
        </div>

        <div class="p-5">
            <div id="scanner-view" class="scanner-container mb-6 shadow-inner">
                <div id="reader" style="width: 100%;"></div>
                <div class="scan-guide"></div>
                <div class="scan-line"></div>
            </div>

            <div id="ctrl-panel" class="text-center">
                <button onclick="startScanning()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                    スキャンを開始
                </button>
            </div>

            <div id="result-form" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom duration-500">
                <div class="bg-slate-900 rounded-[2rem] p-6 text-white shadow-2xl">
                    <div class="space-y-5">
                        <div>
                            <label class="text-[10px] text-indigo-400 font-bold block mb-1">品番 (PART NO.)</label>
                            <input id="res-pn" type="text" readonly class="w-full bg-transparent border-b-2 border-slate-700 text-2xl font-black text-white outline-none py-1">
                        </div>
                        <div>
                            <label class="text-[10px] text-indigo-400 font-bold block mb-1">品名 (PART NAME)</label>
                            <input id="res-nm" type="text" placeholder="品名を入力してください" class="w-full bg-transparent border-b-2 border-indigo-500 text-lg font-bold text-white outline-none focus:border-white py-1">
                            <p id="db-status" class="text-[10px] mt-1 text-indigo-300 italic"></p>
                        </div>
                        <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10">
                            <span class="font-bold">入庫数量</span>
                            <input id="res-qty" type="number" value="1" class="w-20 bg-indigo-600 text-white text-center font-black rounded-lg py-2 outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="location.reload()" class="bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">キャンセル</button>
                    <button onclick="submitToDatabase()" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all">在庫を登録</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around py-4">
            <button onclick="location.reload()" class="flex flex-col items-center text-indigo-600">
                <span class="text-2xl">🏠</span><span class="text-[10px] font-bold">ホーム</span>
            </button>
        </nav>
    </div>

    <script>
        const API_URL = "https://buzaikanri.onrender.com";
        let html5QrCode;

        function showToast(msg, isErr=false) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.style.background = isErr ? "#ef4444" : "#10b981";
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        async function startScanning() {
            document.getElementById('ctrl-panel').classList.add('hidden');
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 15, 
                qrbox: { width: 280, height: 120 },
                aspectRatio: 1.0
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    onScanSuccess
                );
            } catch (err) {
                showToast("カメラの起動に失敗しました", true);
            }
        }

        async function onScanSuccess(decodedText) {
            await html5QrCode.stop();
            const partNo = decodedText.trim();
            document.getElementById('res-pn').value = partNo;
            
            // データベースから品名を自動検索
            showToast("品名を照会中...");
            try {
                const response = await fetch(`${API_URL}/stock/search?part_no=${encodeURIComponent(partNo)}`);
                const data = await response.json();
                
                const resForm = document.getElementById('result-form');
                const resNm = document.getElementById('res-nm');
                const dbStatus = document.getElementById('db-status');

                if(data && data.name) {
                    resNm.value = data.name;
                    dbStatus.innerText = "✓ 登録済みの品名を表示しています";
                    showToast("データを取得しました");
                } else {
                    resNm.value = "";
                    resNm.placeholder = "新しい品名を入力";
                    dbStatus.innerText = "⚠ 未登録の品番です。品名を入力してください";
                    showToast("新規アイテムです", false);
                }
                
                resForm.classList.remove('hidden');
            } catch (e) {
                showToast("通信エラーが発生しました", true);
                document.getElementById('result-form').classList.remove('hidden');
            }
        }

        async function submitToDatabase() {
            const pn = document.getElementById('res-pn').value;
            const nm = document.getElementById('res-nm').value.trim();
            const qty = parseInt(document.getElementById('res-qty').value);

            if(!nm) return showToast("品名を入力してください", true);

            try {
                const res = await fetch(`${API_URL}/stock/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        part_no: pn,
                        name: nm,
                        qty: qty,
                        user: "SCAN_APP_JA"
                    })
                });
                
                if(res.ok) {
                    showToast("登録が完了しました！");
                    setTimeout(() => location.reload(), 2000);
                } else {
                    throw new Error();
                }
            } catch (e) {
                showToast("サーバー登録に失敗しました", true);
            }
        }
    </script>
</body>
</html>
